<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hệ Thống Phát Hiện Lỗi Đóng Gói</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    /* Ép 4 nhãn hiển thị trên cùng 1 hàng duy nhất và chia đều 100% độ rộng */
    .counts-row-equal {
      display: flex;
      flex-direction: row;
      gap: 12px;
      width: 100%;
    }
    .counts-row-equal .count-item {
      flex: 1; /* Chia đều độ rộng bằng nhau (mỗi ô chiếm 25%) */
      background: #0f172a;
      border-radius: 8px;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid #334155;
      min-width: 0; /* Tránh vỡ khung chữ trên màn hình nhỏ */
    }
  </style>
</head>
<body>
  <header>
    <h1>HỆ THỐNG PHÁT HIỆN LỖI ĐÓNG GÓI CHAI NƯỚC (22161004 - 22161043)</h1>
    <span id="status-badge" class="badge good">BÌNH THƯỜNG</span>
  </header>

  <main class="layout">
    <div class="video-col">
      <section class="card stream-card">
        <h2>📷 Camera Realtime</h2>
        <img src="/video_feed" id="stream" alt="Video stream">
      </section>
    </div>

    <div class="stats-col">
      <section class="stats-grid">
        <div class="card stat-card">
          <span class="stat-icon">📦</span>
          <span class="stat-label">Tổng chai</span>
          <span class="stat-value" id="stat-total">0</span>
        </div>
        <div class="card stat-card good-card">
          <span class="stat-icon">✅</span>
          <span class="stat-label">Bình thường</span>
          <span class="stat-value" id="stat-good">0</span>
        </div>
        <div class="card stat-card defect-card">
          <span class="stat-icon">❌</span>
          <span class="stat-label">Lỗi phát hiện</span>
          <span class="stat-value" id="stat-defect">0</span>
        </div>
      </section>

      <section class="card">
        <h2>📊 Thống Kê Theo Loại</h2>
        <div class="counts-row-equal">
          <div class="count-item"><span class="count-label">QUALIFIELD</span><span class="count-value" id="lbl-qualifield">0</span></div>
          <div class="count-item"><span class="count-label">MISSING LABEL</span><span class="count-value" id="lbl-missing-label">0</span></div>
          <div class="count-item"><span class="count-label">WRONG LABEL</span><span class="count-value" id="lbl-wrong-label">0</span></div>
          <div class="count-item"><span class="count-label">NO CAP</span><span class="count-value" id="lbl-no-cap">0</span></div>
        </div>
      </section>

      <section class="card">
        <h2>🕒 Lịch Sử Phát Hiện</h2>
        <table id="history-table">
          <thead>
            <tr><th>Thời gian</th><th>Loại sản phẩm / Lỗi</th><th>Độ tin cậy</th></tr>
          </thead>
          <tbody id="history-body"></tbody>
        </table>
      </section>
    </div>
  </main>

  <script>
    async function fetchStats() {
      try {
        const res  = await fetch("/api/stats");
        const data = await res.json();

        document.getElementById("stat-total").textContent  = data.total;
        document.getElementById("stat-good").textContent   = data.good;
        document.getElementById("stat-defect").textContent = data.defect;

        // Cập nhật giá trị 4 ô nhãn nằm ngang
        document.getElementById("lbl-qualifield").textContent   = data.counts["QUALIFIELD"] || 0;
        document.getElementById("lbl-missing-label").textContent = data.counts["MISSING LABEL"] || 0;
        document.getElementById("lbl-wrong-label").textContent   = data.counts["WRONG LABEL"] || 0;
        document.getElementById("lbl-no-cap").textContent        = data.counts["NO CAP"] || 0;

        // Badge trạng thái thời gian thực
        const badge = document.getElementById("status-badge");
        if (data.defect > 0) {
          badge.className = "badge defect";
          badge.textContent = "⚠️ PHÁT HIỆN LỖI";
        } else {
          badge.className = "badge good";
          badge.textContent = "✅ BÌNH THƯỜNG";
        }

        // Cập nhật bảng lịch sử phát hiện tức thì
        const tbody = document.getElementById("history-body");
        tbody.innerHTML = "";
        for (const item of data.history) {
          let rowStyle = item.labels[0] === "QUALIFIELD" ? "style='color: #4ade80; font-weight: bold;'" : "style='color: #f87171;'";
          tbody.innerHTML += `
            <tr ${rowStyle}>
              <td>${item.time}</td>
              <td>${item.labels.join(", ")}</td>
              <td>${(item.score * 100).toFixed(1)}%</td>
            </tr>`;
        }
      } catch (e) { console.error("Error: ", e); }
    }

    // Tần suất quét dữ liệu nhanh (500ms) đảm bảo nhảy số song song với camera
    setInterval(fetchStats, 500);
    fetchStats();
  </script>
</body>
</html>
